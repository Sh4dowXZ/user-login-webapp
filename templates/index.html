<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login Webapp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #e0f2fe, #f8fafc 55%);
        }
        .hero-card {
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.14);
        }
    </style>
</head>
<body class="d-flex align-items-center">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="card hero-card p-4 p-md-5 text-center bg-white">
                <h1 class="display-6 fw-semibold mb-3">User Login Webapp</h1>
                <p class="lead text-secondary mb-4">Register a new account or login to an existing one with a cleaner, modern interface.</p>
                <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                    <a href="/register" class="btn btn-success btn-lg px-4">Create Account</a>
                    <a href="/login" class="btn btn-outline-primary btn-lg px-4">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
