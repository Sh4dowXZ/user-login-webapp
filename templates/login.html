<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
        }
        .auth-card {
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        }
    </style>
</head>
<body class="d-flex align-items-center py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
            <div class="card auth-card p-4 p-md-5 bg-white">
                <div class="text-center mb-4">
                    <h1 class="h3 mb-2">Welcome Back</h1>
                    <p class="text-secondary mb-0">Login to access your account.</p>
                </div>

                {% if message %}
                <div class="alert alert-{{ message_type }}" role="alert">
                    {{ message }}
                </div>
                {% endif %}

                <form action="/login" method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                </form>

                <p class="text-center text-secondary mt-4 mb-0">
                    New here? <a href="/register" class="text-decoration-none">Create an account</a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
